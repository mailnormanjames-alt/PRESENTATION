<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#222"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="light" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#2a2a2a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="0.5" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#333" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spotlight)"/>
  <!-- Silhouette -->
  <ellipse cx="300" cy="200" rx="55" ry="65" fill="#2a2a2a"/>
  <path d="M245 265 Q245 320 260 380 L260 600 Q260 620 280 620 L320 620 Q340 620 340 600 L340 380 Q355 320 355 265 Q355 240 300 230 Q245 240 245 265Z" fill="#252525"/>
  <!-- Shoulders -->
  <path d="M245 275 Q200 290 180 340 L180 400 Q200 380 245 370Z" fill="#232323"/>
  <path d="M355 275 Q400 290 420 340 L420 400 Q400 380 355 370Z" fill="#232323"/>
  <!-- Fabric detail lines -->
  <line x1="260" y1="400" x2="260" y2="580" stroke="#2d2d2d" stroke-width="0.5" opacity="0.5"/>
  <line x1="300" y1="380" x2="300" y2="600" stroke="#2d2d2d" stroke-width="0.5" opacity="0.5"/>
  <line x1="340" y1="400" x2="340" y2="580" stroke="#2d2d2d" stroke-width="0.5" opacity="0.5"/>
  <!-- Light ray -->
  <rect x="280" y="0" width="40" height="800" fill="url(#light)" opacity="0.3"/>
  <!-- Grain texture overlay -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
    <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
  </filter>
  <rect width="600" height="800" fill="transparent" filter="url(#grain)" opacity="0.08"/>
  <!-- Label -->
  <text x="300" y="760" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" letter-spacing="3" fill="#B89B4D" opacity="0.6">LOT 001</text>
</svg>